# cargo-deny configuration
# Schema reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html
# Run locally with `just deny` (which calls `cargo deny check`).

[graph]
# Treat all targets as in-scope; binaries here are deployed to linux x86_64
# and aarch64, dev happens on macos/linux. Listing them keeps target-cfg
# crates (e.g. windows-sys) from cluttering the graph on those platforms.
all-features = false
no-default-features = false

[advisories]
version = 2
# Vulnerabilities (the default key) stay at fail-the-build. The two
# advisory categories below default to "all" / "workspace" in v2 (i.e.
# also fail) — common in transitive deps (crates entering RUSTSEC
# limbo), so we explicitly downgrade to warn to avoid breaking CI on
# every upstream advisory bump that isn't actually a security issue.
unmaintained = "warn"
unsound      = "warn"
yanked       = "warn"
ignore       = []

[licenses]
version = 2
# Permissive licences only. Add new ones explicitly as deps require.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
    # CDLA-Permissive-2.0 — used by `webpki-roots` to ship Mozilla's CA
    # bundle as data. OSI-recognised permissive licence; no copyleft on
    # downstream code, only attribution.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[[licenses.exceptions]]
# `ring` ships under a custom OpenSSL-style licence that the SPDX parser
# can't map cleanly; this is the standard escape hatch.
allow = ["OpenSSL"]
name = "ring"

[bans]
# Multiple versions of the same crate inflate binary size and compile time.
# Warn (don't deny) — duplicates are unavoidable on a fresh dep graph.
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal `path = "..."` deps don't carry a version constraint
# and read as wildcards to cargo-deny's parser. They're not the kind of
# wildcard the lint targets (uncontrolled crates.io ranges); allow them
# explicitly so the lint stays useful for real wildcards.
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
