# clippy.toml — workspace-wide clippy configuration.
# Schema: https://doc.rust-lang.org/clippy/lint_configuration.html
#
# Restriction lints (unwrap_used, expect_used, dbg_macro, print_stdout/stderr)
# are denied workspace-wide via [workspace.lints.clippy] in root Cargo.toml.
# Tests legitimately need these for assertion ergonomics — opt them out here
# rather than peppering `#[allow(...)]` across every test module.

allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-dbg-in-tests = true
allow-print-in-tests = true

# clippy::cognitive_complexity threshold. Default is 25; we set 7 to make
# the metric a real readability signal rather than a long-tail catch-all.
# At 7, dispatcher tables and multi-fallback error paths surface — the
# lint is force-warned in CI (SARIF), not blocking, so it's an alarm to
# refactor or annotate, not a wall. Per-function allow is the answer for
# legitimate exceptions like dispatch tables (long but isomorphic).
cognitive-complexity-threshold = 7
