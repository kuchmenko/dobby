name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# All actual checks live in ci-checks.yml so PR-time CI and any future
# release/deploy gate run the exact same suite.
jobs:
  checks:
    uses: ./.github/workflows/ci-checks.yml
    with:
      upload_sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    permissions:
      contents: read
      security-events: write
    secrets: inherit
