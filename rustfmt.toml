# rustfmt configuration.
#
# Nightly-only options (imports_granularity, group_imports, wrap_comments,
# format_code_in_doc_comments) require `unstable_features = true`. The CI
# `fmt` job runs nightly. Locally, run `just fmt` (which uses
# `cargo +nightly fmt`) to match CI output.

# Stable knobs
max_width = 100
use_field_init_shorthand = true
use_try_shorthand = true
newline_style = "Unix"
reorder_imports = true
reorder_modules = true

# Nightly-only knobs
unstable_features = true
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
wrap_comments = true
comment_width = 100
format_code_in_doc_comments = true
